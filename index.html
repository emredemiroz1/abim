<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>İyi ki Doğdun Abim!</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      color: white;
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    .glass-panel {
      background: rgba(30, 41, 59, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }
    .modal-enter { animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    
    @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
    .animate-float { animation: float 4s ease-in-out infinite; }
    
    /* iPhone için dokunma iyileştirmesi */
    .tap-highlight-none { -webkit-tap-highlight-color: transparent; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useState, useMemo } = React;

    function App() {
      const [isPlaying, setIsPlaying] = useState(false);
      const [selectedImg, setSelectedImg] = useState(null);
      const [timeElapsed, setTimeElapsed] = useState({ years: 0, months: 0, days: 0, hours: 0, minutes: 0, seconds: 0 });

      // Kardeşlik Sayacı Mantığı (25 Temmuz 2002)
      useEffect(() => {
        const startDate = new Date(2002, 6, 25, 0, 0, 0); // Temmuz 6. ay (0'dan başlar)
        
        const updateCounter = () => {
          const now = new Date();
          let diff = now - startDate;

          const seconds = Math.floor((diff / 1000) % 60);
          const minutes = Math.floor((diff / (1000 * 60)) % 60);
          const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
          const daysTotal = Math.floor(diff / (1000 * 60 * 60 * 24));
          
          const years = Math.floor(daysTotal / 365);
          const days = daysTotal % 365;

          setTimeElapsed({ years, days, hours, minutes, seconds });
        };

        const timer = setInterval(updateCounter, 1000);
        updateCounter();
        return () => clearInterval(timer);
      }, []);

      useEffect(() => {
        // İlk girişte konfeti
        confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#fbbf24', '#f87171', '#60a5fa'] });
      }, []);

      const gridItems = [
        { id: '2', src: '2.jpeg' }, { id: '3', src: '3.jpeg' }, { id: '4', src: '4.jpeg' },
        { id: '6', src: '6.jpeg' }, { id: '1', src: '1.jpeg', isCenter: true }, { id: '7', src: '7.jpeg' },
        { id: '8', src: '8.jpeg' }, { id: '9', src: '9.jpeg' }, { id: '10', src: '10.jpeg' }
      ];

      return (
        <div className="min-h-screen pb-24 px-4 pt-8 flex flex-col items-center tap-highlight-none">
          
          {/* Arka Plan YouTube */}
          <div style={{ display: 'none' }}>
            {isPlaying && (
              <iframe 
                src="https://www.youtube.com/embed/eaEf7zTThX4?autoplay=1&loop=1&playlist=eaEf7zTThX4" 
                allow="autoplay" 
              />
            )}
          </div>

          {/* iPhone Uyumlu Müzik Butonu */}
          <button 
            onClick={() => setIsPlaying(!isPlaying)}
            className={`fixed bottom-8 right-6 z-[60] flex items-center gap-3 px-6 py-4 rounded-full border shadow-2xl backdrop-blur-xl transition-all active:scale-95 ${
              isPlaying ? 'bg-amber-500 border-amber-400 text-white' : 'bg-white/10 border-white/20 text-white'
            }`}
          >
            <span className={isPlaying ? 'animate-spin' : ''}>{isPlaying ? '🎵' : '🔇'}</span>
            <span className="font-bold text-sm tracking-widest uppercase">{isPlaying ? 'Müzik Açık' : 'Müziği Başlat'}</span>
          </button>

          {/* Başlık Bölümü */}
          <div className="max-w-2xl w-full text-center mb-8 animate-float">
            <h1 className="text-5xl md:text-7xl font-black mb-4 text-transparent bg-clip-text bg-gradient-to-b from-amber-200 to-orange-500 drop-shadow-2xl uppercase tracking-tighter">
              İYİ Kİ DOĞDUN<br/>ABİM! 🎂
            </h1>
            <p className="text-lg text-slate-300 font-medium px-4 leading-relaxed">
              Beraber geçirdiğimiz tüm bu güzel anılara daha nicelerini eklemek dileğiyle. Yeni yaşın sana güzellikler getirsin. Seni çok seviyorum! ❤️
            </p>
          </div>

          {/* KARDEŞLİK SAYACI - iPhone için özel tasarım */}
          <div className="w-full max-w-lg glass-panel rounded-3xl p-6 mb-10 text-center shadow-[0_0_40px_rgba(0,0,0,0.3)]">
            <div className="text-[10px] font-black uppercase tracking-[0.3em] text-amber-400 mb-4 opacity-80">
              Kardeş Olduğumuzdan Beri Geçen Süre
            </div>
            <div className="flex justify-between items-center gap-2">
              {[
                { label: 'YIL', val: timeElapsed.years },
                { label: 'GÜN', val: timeElapsed.days },
                { label: 'SAAT', val: timeElapsed.hours },
                { label: 'DAK', val: timeElapsed.minutes },
                { label: 'SN', val: timeElapsed.seconds }
              ].map((unit, i) => (
                <div key={i} className="flex flex-col items-center flex-1">
                  <span className="text-2xl sm:text-3xl font-black text-white tabular-nums">{unit.val}</span>
                  <span className="text-[8px] font-bold text-slate-500 mt-1">{unit.label}</span>
                </div>
              ))}
            </div>
          </div>

          {/* FOTOĞRAF IZGARASI */}
          <div className="w-full max-w-4xl grid grid-cols-3 gap-3 sm:gap-6 relative px-2">
            {gridItems.map((item) => (
              <div 
                key={item.id} 
                onClick={() => setSelectedImg(item.src)}
                className={`relative aspect-square rounded-2xl overflow-hidden shadow-xl transition-all active:scale-95 cursor-pointer
                  ${item.isCenter 
                    ? 'scale-[1.12] z-20 border-4 border-amber-400 shadow-[0_0_30px_rgba(251,191,36,0.4)]' 
                    : 'z-10 border border-white/10 opacity-90 hover:opacity-100'
                  }`}
              >
                <img 
                  src={`./${item.src}`} 
                  className="w-full h-full object-cover" 
                  loading="lazy"
                  alt="Anı"
                />
                {item.isCenter && (
                   <div className="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/80 to-transparent p-2 text-center">
                     <span className="text-[10px] font-black tracking-tighter uppercase text-amber-300">gardasimlaben</span>
                   </div>
                )}
              </div>
            ))}
          </div>

          {/* FOTOĞRAF BÜYÜTME MODALI (Lightbox) */}
          {selectedImg && (
            <div 
              className="fixed inset-0 z-[100] bg-black/95 backdrop-blur-xl flex items-center justify-center p-4 modal-enter"
              onClick={() => setSelectedImg(null)}
            >
              <button className="absolute top-12 right-6 text-white text-4xl font-light">×</button>
              <img 
                src={`./${selectedImg}`} 
                className="max-w-full max-h-[80vh] rounded-xl shadow-2xl object-contain border border-white/10" 
                alt="Büyük Görünüm"
              />
              <div className="absolute bottom-12 text-white/50 text-xs font-medium uppercase tracking-widest">Kapatmak için dokun</div>
            </div>
          )}
          
          <footer className="mt-16 opacity-30 text-[10px] font-bold tracking-widest uppercase">
            Designed with Love for My Brother
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body> 
</html>
